name: legalhelp_kz
description: AI-powered Legal Assistant for Kazakhstan
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # HTTP Client
  dio: ^5.4.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Camera & OCR
  camera: ^0.10.5+9
  google_mlkit_text_recognition: ^0.13.0

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # Icons
  lucide_icons: ^0.257.0

  # UI
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  pin_code_fields: ^8.0.1
  intl: ^0.19.0
  permission_handler: ^11.3.0
  table_calendar: ^3.1.0
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.3.3
  crypto: ^3.0.3

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # Networking
  http: ^1.2.1
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

